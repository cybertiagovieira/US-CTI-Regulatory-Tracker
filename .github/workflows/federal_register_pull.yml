name: Monthly Intelligence Pull (Tier 1 & Tier 2)

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Tier 1 (Federal Register)
        run: python pull_data.py

      - name: Execute Tier 2 (Silobreaker API)
        env:
          SB_API_KEY: ${{ secrets.SB_API_KEY }}
          SB_SHARED_KEY: ${{ secrets.SB_SHARED_KEY }}
        run: python tier2_pull.py

      - name: Commit and Push Artifacts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest_pull.json latest_tier2_pull.json
          git commit -m "Automated CTI pull: Tier 1 and Tier 2 extraction" || echo "No changes to commit"
          git push
