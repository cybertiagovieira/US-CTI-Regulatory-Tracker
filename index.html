<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US CTI Regulatory Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script id="data-layer">
    // Artifact injection point for offline HTML exports
    window.INJECTED_DATA = null;
</script>
<style>
    :root {
        --bg-main: #f1f5f9; 
        --bg-panel: #ffffff; 
        --text-main: #0f172a; 
        --text-muted: #64748b; 
        --border: #cbd5e1;
        --c-primary: rgb(0, 145, 90);
        --c-primary-hover: rgb(0, 115, 70);
        --hl-1: rgb(239, 123, 91);
        --hl-2: rgb(255, 160, 91);
        --hl-3: rgb(255, 222, 51);
        --c-gray-dark: #475569;
        --c-gray-light: #94a3b8;
        --sev-high: #dc2626;
        --sev-med: #d97706;
        --sev-low: #059669;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; }
    .container { max-width: 1500px; margin: 0 auto; }
    
    #admin-panel { background: #f0fdf4; border: 1px solid var(--c-primary); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .admin-mode #admin-panel { display: block; }
    #admin-panel h2 { margin-top: 0; color: var(--c-primary); font-size: 16px; margin-bottom: 10px;}
    .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 10px; }
    input, select, textarea { width: 100%; padding: 8px; background: #ffffff; border: 1px solid var(--border); color: var(--text-main); border-radius: 4px; box-sizing: border-box; font-size: 13px; }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--c-primary); border-color: transparent; }
    .btn-action { background: var(--c-primary); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-action:hover { background: var(--c-primary-hover); }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h1 { margin: 0; font-size: 24px; color: var(--text-main); }
    .export-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-export { background: var(--c-gray-dark); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;}
    .btn-export:hover { background: #334155; }
    .btn-brief { background: #1e293b; color: #fbbf24; border: 1px solid #fbbf24; }
    .btn-brief:hover { background: #0f172a; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .kpi-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); text-align: center; }
    .kpi-value { font-size: 28px; font-weight: bold; color: var(--text-main); margin: 5px 0; }
    .kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: bold;}
    .val-alert { color: var(--sev-high); }

    .filter-bar { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); align-items: center; }

    .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
    .sidebar { display: flex; flex-direction: column; gap: 20px; }
    .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .panel h3 { margin: 0 0 15px 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
    .btn-export-png { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 10px; }
    .btn-export-png:hover { background: var(--bg-main); color: var(--text-main); }
    .chart-container { position: relative; height: 220px; width: 100%; }
    
    .timeline { border-left: 2px solid var(--border); padding-left: 20px; margin-left: 10px;}
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-weight: bold; border: 2px dashed var(--border); border-radius: 8px; background: var(--bg-panel); }
    .event { background: var(--bg-panel); padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid transparent; border: 1px solid var(--border); position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .event.sev-High { border-left: 4px solid var(--sev-high); background: #fef2f2; }
    .event.sev-Medium { border-left: 4px solid var(--sev-med); }
    .event.sev-Low { border-left: 4px solid var(--sev-low); }
    .event::before { content: ''; position: absolute; left: -26px; top: 18px; width: 10px; height: 10px; border-radius: 50%; background: var(--bg-panel); border: 2px solid var(--border); }
    
    .btn-delete { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: var(--hl-1); cursor: pointer; font-size: 18px; display: none; }
    .admin-mode .btn-delete { display: block; }
    
    .meta { display: flex; gap: 8px; margin-bottom: 8px; font-size: 11px; font-weight: bold; align-items: center; flex-wrap: wrap;}
    .badge { padding: 3px 6px; border-radius: 4px; color: #ffffff; text-shadow: 0 1px 1px rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.1); }
    .badge.id-tag { background: #e2e8f0; color: #475569; text-shadow: none; font-family: monospace;}
    .badge.agency { background: var(--c-gray-dark); }
    .badge.theme { background: #3b82f6; }
    .badge.sector { background: #8b5cf6; }
    .badge.countdown { background: var(--text-main); }
    .badge.countdown.urgent { background: var(--sev-high); animation: pulse 2s infinite; }
    .date { color: var(--text-muted); margin-left: auto; font-weight: normal; }
    .title { margin: 0 0 8px 0; font-size: 15px; color: var(--text-main); }
    .summary { margin: 0; color: #334155; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
    
    a.source-link { color: var(--c-primary); text-decoration: none; font-size: 12px; margin-top: 8px; display: inline-block; font-weight: bold;}
    a.source-link:hover { text-decoration: underline; }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
        70% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
        100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }

    @media (max-width: 900px) {
        .dashboard-grid { grid-template-columns: 1fr; }
        .timeline { margin-left: 5px; border-left: none; padding-left: 0;}
        .event::before { display: none; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>US CTI Regulatory Tracker</h1>
        <div class="export-group">
            <button class="btn-export btn-brief" onclick="generateExecBrief()">Generate Executive Brief</button>
            <button class="btn-export" onclick="exportData('csv')">CSV</button>
            <button class="btn-export" onclick="exportData('json')">JSON</button>
            <button class="btn-export" onclick="exportArtifact()">HTML Download</button>
        </div>
    </div>

    <div id="admin-panel">
        <h2>Administrator Data Injection</h2>
        <div class="input-grid" style="background: #e2e8f0; padding: 10px; border-radius: 4px; margin-bottom: 10px;">
            <input type="password" id="gh-token" placeholder="GitHub PAT (Contents Read/Write)" required>
            <input type="text" id="gh-repo" placeholder="Target Repo (e.g. user/repo)" value="cybertiagovieira/US-CTI-Regulatory-Tracker" required>
        </div>
        <div class="input-grid">
            <input type="date" id="in-date" title="Issuance Date" required>
            <input type="date" id="in-effective-date" title="Compliance/Effective Date">
            <select id="in-agency" required>
                <option value="OCC">OCC</option>
                <option value="FDIC">FDIC</option>
                <option value="FRB">FRB</option>
                <option value="SEC">SEC</option>
                <option value="CFTC">CFTC</option>
                <option value="FinCEN">FinCEN</option>
                <option value="CFPB">CFPB</option>
                <option value="NYDFS">NYDFS</option>
                <option value="CISA">CISA</option>
                <option value="NFA">NFA</option>
                <option value="Other/SRO">Other/SRO</option>
            </select>
            <select id="in-type" required>
                <option value="Final Rule">Final Rule</option>
                <option value="Enforcement Action">Enforcement Action</option>
                <option value="NPRM">NPRM</option>
                <option value="Guidance/Circular">Guidance/Circular</option>
                <option value="Examination Priority">Examination Priority</option>
                <option value="Speech/Statement">Speech/Statement</option>
            </select>
            <select id="in-severity" required>
                <option value="Low">Low Severity</option>
                <option value="Medium">Medium Severity</option>
                <option value="High">High Severity</option>
            </select>
            <select id="in-theme" required>
                <option value="General">General</option>
                <option value="Incident Reporting">Incident Reporting</option>
                <option value="Ransomware">Ransomware</option>
                <option value="Third-Party Risk">Third-Party Risk</option>
                <option value="Data Privacy">Data Privacy</option>
                <option value="Governance">Governance</option>
            </select>
            <select id="in-sector" required>
                <option value="All Entities">All Entities</option>
                <option value="G-SIBs">G-SIBs</option>
                <option value="Broker-Dealers">Broker-Dealers</option>
                <option value="Credit Unions">Credit Unions</option>
                <option value="Digital Asset Platforms">Digital Asset Platforms</option>
            </select>
        </div>
        <div class="input-grid">
            <input type="text" id="in-title" placeholder="Action Title" required style="grid-column: 1 / -1;">
            <textarea id="in-summary" placeholder="Intelligence Summary" rows="2" required style="grid-column: 1 / -1;"></textarea>
        </div>
        <button class="btn-action" onclick="addEntry()">Execute Injection</button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-label">Active High Impact</div>
            <div class="kpi-value val-alert" id="kpi-high-sev">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Deadlines < 90 Days</div>
            <div class="kpi-value val-alert" id="kpi-deadlines">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Total Volume (YTD)</div>
            <div class="kpi-value" id="kpi-total">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Primary Active Agency</div>
            <div class="kpi-value" id="kpi-agency">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Dominant Threat Vector</div>
            <div class="kpi-value" id="kpi-theme">-</div>
        </div>
    </div>

    <div class="filter-bar">
        <select id="filter-month" onchange="applyFilters()"><option value="All">All Time</option></select>
        <select id="filter-agency" onchange="applyFilters()"><option value="All">All Agencies</option></select>
        <select id="filter-type" onchange="applyFilters()"><option value="All">All Action Types</option></select>
        <select id="filter-theme" onchange="applyFilters()"><option value="All">All Threat Themes</option></select>
        <select id="filter-sector" onchange="applyFilters()"><option value="All">All Target Sectors</option></select>
        <input type="text" id="filter-text" placeholder="Search keywords or IDs..." onkeyup="applyFilters()" style="grid-column: 1 / -1;">
    </div>

    <div class="dashboard-grid">
        <div class="sidebar">
            <div class="panel">
                <h3>Cyber Threat Taxonomy <button class="btn-export-png" onclick="exportChart('radarChart', 'Taxonomy')">PNG</button></h3>
                <div class="chart-container"><canvas id="radarChart"></canvas></div>
            </div>
            <div class="panel">
                <h3>Action Distribution <button class="btn-export-png" onclick="exportChart('donutChart', 'Distribution')">PNG</button></h3>
                <div class="chart-container"><canvas id="donutChart"></canvas></div>
            </div>
            <div class="panel">
                <h3>Agency Engagement <button class="btn-export-png" onclick="exportChart('barChart', 'Agency')">PNG</button></h3>
                <div class="chart-container"><canvas id="barChart"></canvas></div>
            </div>
        </div>
        <div class="main-content">
            <div class="timeline" id="timelineContainer"></div>
        </div>
    </div>
</div>

<script>
    const typeConfig = {
        "Final Rule": { color: "rgb(239, 123, 91)" },
        "Enforcement Action": { color: "rgb(255, 160, 91)" },
        "NPRM": { color: "rgb(255, 222, 51)" },
        "Guidance/Circular": { color: "rgb(0, 145, 90)" },
        "Examination Priority": { color: "#475569" },
        "Speech/Statement": { color: "#94a3b8" }
    };

    let rawData = [];
    let charts = {};
    let currentFileSha = '';
    let isProcessing = false;

    // Security: Escapes HTML injection from raw JSON strings
    function sanitizeHTML(str) {
        if (!str) return "";
        const temp = document.createElement('div');
        temp.textContent = str;
        return temp.innerHTML;
    }

    function b64EncodeUnicode(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));
    }

    async function fetchSha() {
        const repo = document.getElementById('gh-repo').value;
        if(!repo) return;
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/master_data.json`);
            if(res.ok) {
                const data = await res.json();
                currentFileSha = data.sha;
            }
        } catch(e) {}
    }

    async function init() {
        // Gated Admin Access: URL requires ?admin=true
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            document.body.classList.add('admin-mode');
        }

        if (window.INJECTED_DATA) {
            rawData = window.INJECTED_DATA;
        } else if (window.location.protocol !== 'file:') {
            try {
                const response = await fetch(`master_data.json?t=${new Date().getTime()}`);
                if(response.ok) {
                    rawData = await response.json();
                }
            } catch (error) { console.error("Data inaccessible."); }
        }

        await fetchSha();
        populateFilterOptions();
        
        if (typeof Chart !== 'undefined') {
            Chart.defaults.color = '#64748b';
            Chart.defaults.borderColor = '#e2e8f0';
            Chart.defaults.font.size = 11;
        }
        
        applyFilters();
    }

    function populateFilterOptions() {
        const monthSelect = document.getElementById('filter-month');
        monthSelect.innerHTML = '<option value="All">All Time</option>';
        const months = [...new Set(rawData.filter(d => d.date && d.date.length >= 7).map(d => d.date.substring(0, 7)))].sort().reverse();
        months.forEach(m => {
            const label = new Date(m + "-02").toLocaleString('default', { month: 'short', year: 'numeric' });
            monthSelect.innerHTML += `<option value="${m}">${label}</option>`;
        });

        const selects = ['filter-agency', 'filter-type', 'filter-theme', 'filter-sector'];
        const keys = ['agency', 'type', 'theme', 'target_sector'];
        const labels = ['Agencies', 'Action Types', 'Threat Themes', 'Target Sectors'];

        selects.forEach((id, i) => {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="All">All ${labels[i]}</option>`;
            const unique = [...new Set(rawData.map(d => d[keys[i]]).filter(Boolean))].sort();
            unique.forEach(val => el.innerHTML += `<option value="${val}">${val}</option>`);
        });
    }

    function calculateDays(targetDateStr) {
        if(!targetDateStr) return null;
        const parts = targetDateStr.split('-');
        if(parts.length !== 3) return null;
        const today = new Date();
        today.setHours(0,0,0,0);
        const target = new Date(parts[0], parts[1] - 1, parts[2]);
        if(isNaN(target.getTime())) return null;
        target.setHours(0,0,0,0);
        return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    function applyFilters() {
        const filters = {
            month: document.getElementById('filter-month').value,
            agency: document.getElementById('filter-agency').value,
            type: document.getElementById('filter-type').value,
            theme: document.getElementById('filter-theme').value,
            sector: document.getElementById('filter-sector').value,
            text: document.getElementById('filter-text').value.toLowerCase()
        };

        let filtered = rawData.filter(item => {
            const safeTitle = item.title ? String(item.title).toLowerCase() : "";
            const safeSummary = item.summary ? String(item.summary).toLowerCase() : "";
            const safeId = item.id ? String(item.id).toLowerCase() : "";

            let matchText = filters.text === "" || 
                safeTitle.includes(filters.text) || 
                safeSummary.includes(filters.text) ||
                safeId.includes(filters.text);
            
            return (filters.month === "All" || (item.date && item.date.startsWith(filters.month))) &&
                   (filters.agency === "All" || item.agency === filters.agency) &&
                   (filters.type === "All" || item.type === filters.type) &&
                   (filters.theme === "All" || item.theme === filters.theme) &&
                   (filters.sector === "All" || item.target_sector === filters.sector) &&
                   matchText;
        });

        filtered.sort((a, b) => {
            const daysA = calculateDays(a.effective_date);
            const daysB = calculateDays(b.effective_date);
            if (daysA !== null && daysA >= 0 && daysB !== null && daysB >= 0) return daysA - daysB;
            if (daysA !== null && daysA >= 0) return -1;
            if (daysB !== null && daysB >= 0) return 1;
            
            // Hardened sort fallback
            const timeA = a.date ? new Date(a.date).getTime() : 0;
            const timeB = b.date ? new Date(b.date).getTime() : 0;
            return (isNaN(timeB) ? 0 : timeB) - (isNaN(timeA) ? 0 : timeA);
        });
        
        updateKPIs(filtered);
        renderTimeline(filtered);
        renderCharts(filtered); // FIX: Restored this function call
    }

    function updateKPIs(data) {
        document.getElementById('kpi-total').textContent = data.length;

        if (data.length === 0) {
            document.getElementById('kpi-agency').textContent = "-";
            document.getElementById('kpi-theme').textContent = "-";
            document.getElementById('kpi-high-sev').textContent = "0";
            document.getElementById('kpi-deadlines').textContent = "0";
            return;
        }

        const counts = { agency: {}, theme: {} };
        let highSev = 0;
        let nearDeadline = 0;

        data.forEach(d => {
            if(d.agency) counts.agency[d.agency] = (counts.agency[d.agency] || 0) + 1;
            if(d.theme && d.theme !== "General") counts.theme[d.theme] = (counts.theme[d.theme] || 0) + 1;
            if(d.severity === 'High') highSev++;
            
            const days = calculateDays(d.effective_date);
            if(days !== null && days >= 0 && days <= 90) nearDeadline++;
        });

        const topAgency = Object.keys(counts.agency).length ? Object.keys(counts.agency).reduce((a, b) => counts.agency[a] > counts.agency[b] ? a : b) : "-";
        const topTheme = Object.keys(counts.theme).length ? Object.keys(counts.theme).reduce((a, b) => counts.theme[a] > counts.theme[b] ? a : b) : "-";

        document.getElementById('kpi-agency').textContent = topAgency;
        document.getElementById('kpi-theme').textContent = topTheme;
        document.getElementById('kpi-high-sev').textContent = highSev;
        document.getElementById('kpi-deadlines').textContent = nearDeadline;
    }

    function renderTimeline(data) {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = ''; 
        
        if (data.length === 0) {
            container.innerHTML = '<div class="empty-state">No intelligence artifacts match the current filter parameters.</div>';
            return;
        }

        const fragment = document.createDocumentFragment();

        data.forEach(item => {
            const cfg = typeConfig[item.type] || { color: "#475569" };
            const badgeTextColor = item.type === "NPRM" ? "#000000" : "#ffffff";
            const sevClass = item.severity ? `sev-${item.severity}` : '';

            const eventDiv = document.createElement('div');
            eventDiv.className = `event ${sevClass}`;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.textContent = '×';
            deleteBtn.onclick = () => deleteEntry(item.id);
            eventDiv.appendChild(deleteBtn);

            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta';

            if(item.id) {
                const idBadge = document.createElement('span');
                idBadge.className = 'badge id-tag';
                idBadge.textContent = String(item.id).substring(0,8);
                idBadge.title = item.id;
                metaDiv.appendChild(idBadge);
            }

            const typeBadge = document.createElement('span');
            typeBadge.className = 'badge';
            typeBadge.style.background = cfg.color;
            typeBadge.style.color = badgeTextColor;
            typeBadge.textContent = item.type;
            metaDiv.appendChild(typeBadge);

            if(item.agency) {
                const agencyBadge = document.createElement('span');
                agencyBadge.className = 'badge agency';
                agencyBadge.textContent = item.agency;
                metaDiv.appendChild(agencyBadge);
            }

            if(item.theme && item.theme !== "General") {
                const themeBadge = document.createElement('span');
                themeBadge.className = 'badge theme';
                themeBadge.textContent = item.theme;
                metaDiv.appendChild(themeBadge);
            }

            if(item.target_sector && item.target_sector !== "All Entities") {
                const sectorBadge = document.createElement('span');
                sectorBadge.className = 'badge sector';
                sectorBadge.textContent = item.target_sector;
                metaDiv.appendChild(sectorBadge);
            }

            const daysLeft = calculateDays(item.effective_date);
            if (daysLeft !== null && daysLeft >= 0) {
                const cdBadge = document.createElement('span');
                cdBadge.className = `badge countdown ${daysLeft <= 30 ? 'urgent' : ''}`;
                cdBadge.textContent = `T-${daysLeft} Days`;
                metaDiv.appendChild(cdBadge);
            }

            const dateSpan = document.createElement('span');
            dateSpan.className = 'date';
            dateSpan.textContent = `Issued: ${item.date}`;
            metaDiv.appendChild(dateSpan);

            eventDiv.appendChild(metaDiv);

            const titleH2 = document.createElement('h2');
            titleH2.className = 'title';
            titleH2.textContent = item.title;
            eventDiv.appendChild(titleH2);

            const summaryP = document.createElement('p');
            summaryP.className = 'summary';
            summaryP.textContent = item.summary;
            eventDiv.appendChild(summaryP);

            if(item.source_url) {
                const link = document.createElement('a');
                link.className = 'source-link';
                link.href = item.source_url;
                link.target = '_blank';
                link.textContent = 'Access Source Document →';
                eventDiv.appendChild(link);
            }

            fragment.appendChild(eventDiv);
        });
        container.appendChild(fragment);
    }

    function renderCharts(data) {
        if (typeof Chart === 'undefined') return;

        try {
            const fixedThemes = ["Incident Reporting", "Ransomware", "Third-Party Risk", "Data Privacy", "Governance"];
            const themeCounts = fixedThemes.map(t => data.filter(d => d.theme === t).length);

            if(charts.radar) charts.radar.destroy();
            charts.radar = new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: { labels: fixedThemes, datasets: [{ label: 'Events', data: themeCounts, backgroundColor: 'rgba(220, 38, 38, 0.2)', borderColor: '#dc2626', pointBackgroundColor: '#dc2626', borderWidth: 2 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { r: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            const types = Object.keys(typeConfig);
            const typeCounts = types.map(t => data.filter(d => d.type === t).length);
            const typeColors = types.map(t => typeConfig[t].color);

            if(charts.donut) charts.donut.destroy();
            charts.donut = new Chart(document.getElementById('donutChart'), {
                type: 'doughnut',
                data: { labels: types, datasets: [{ data: typeCounts, backgroundColor: typeColors, borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10 } } }, cutout: '70%' }
            });

            const agencies = [...new Set(data.map(d => d.agency).filter(Boolean))].sort();
            const agencyCounts = agencies.map(a => data.filter(d => d.agency === a).length);
            
            if(charts.bar) charts.bar.destroy();
            charts.bar = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { labels: agencies, datasets: [{ data: agencyCounts, backgroundColor: '#3b82f6', borderRadius: 3 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

        } catch (e) {
            console.error("Chart generation failed.", e);
        }
    }

    async function syncToGitHub() {
        const token = document.getElementById('gh-token').value;
        const repo = document.getElementById('gh-repo').value;
        if(!token) return alert("GitHub PAT Required.") && false;

        try {
            const shaRes = await fetch(`https://api.github.com/repos/${repo}/contents/master_data.json`);
            if(shaRes.ok) {
                const shaData = await shaRes.json();
                currentFileSha = shaData.sha;
            }
        } catch(e) {}

        const url = `https://api.github.com/repos/${repo}/contents/master_data.json`;
        const content = b64EncodeUnicode(JSON.stringify(rawData, null, 2));
        const body = { message: "Dashboard Admin: Update Payload", content: content, branch: "main" };
        if (currentFileSha) body.sha = currentFileSha;

        try {
            const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if(res.ok) {
                const data = await res.json();
                currentFileSha = data.content.sha;
                return true;
            } else {
                alert("API Rejection: File synchronization failed.");
                return false;
            }
        } catch(e) {
            alert("Network routing error.");
            return false;
        }
    }

    async function addEntry() {
        if (isProcessing) return; 
        
        const payload = {
            id: Date.now().toString(),
            date: document.getElementById('in-date').value,
            effective_date: document.getElementById('in-effective-date').value,
            agency: document.getElementById('in-agency').value,
            type: document.getElementById('in-type').value,
            severity: document.getElementById('in-severity').value,
            theme: document.getElementById('in-theme').value,
            target_sector: document.getElementById('in-sector').value,
            title: document.getElementById('in-title').value,
            summary: document.getElementById('in-summary').value
        };

        if(!payload.date || !payload.title || !payload.summary) return alert('Define Date, Title, and Summary.');

        isProcessing = true;
        const btn = document.querySelector('.btn-action');
        btn.textContent = "Syncing with GitHub...";
        btn.style.opacity = "0.5";

        rawData.push(payload);
        const success = await syncToGitHub();
        if(success) {
            document.getElementById('in-title').value = '';
            document.getElementById('in-summary').value = '';
            document.getElementById('in-effective-date').value = '';
            populateFilterOptions();
            applyFilters();
        } else {
            rawData.pop(); 
        }

        isProcessing = false;
        btn.textContent = "Execute Injection";
        btn.style.opacity = "1";
    }

    async function deleteEntry(id) {
        if (isProcessing) return;
        if(!confirm("Execute deletion protocol? This action is permanent.")) return;
        
        isProcessing = true;
        const backup = [...rawData];
        rawData = rawData.filter(d => d.id !== id);
        
        const success = await syncToGitHub();
        if(success) {
            populateFilterOptions();
            applyFilters();
        } else {
            rawData = backup;
        }
        isProcessing = false;
    }

    function exportChart(canvasId, name) {
        if (typeof Chart === 'undefined') return alert("Charts offline.");
        const link = document.createElement('a');
        link.download = `CTI_Chart_${name}.png`;
        link.href = document.getElementById(canvasId).toDataURL('image/png', 1.0);
        link.click();
    }

    function exportData(format) {
        let content, mime, ext;
        if (format === 'csv') {
            const headers = ['id', 'date', 'effective_date', 'severity', 'agency', 'type', 'theme', 'target_sector', 'title', 'summary', 'source_url'];
            const rows = rawData.map(row => 
                headers.map(h => {
                    let val = row[h] ? String(row[h]).replace(/"/g, '""') : '';
                    return `"${val}"`;
                }).join(',')
            );
            content = [headers.join(','), ...rows].join('\n');
            mime = 'text/csv;charset=utf-8;';
            ext = 'csv';
        } else if (format === 'json') {
            content = JSON.stringify(rawData, null, 2);
            mime = 'application/json';
            ext = 'json';
        }

        const blob = new Blob([content], { type: mime });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `US_CTI_Extract_${new Date().toISOString().split('T')[0]}.${ext}`;
        link.click();
    }

    function exportArtifact() {
        const docClone = document.documentElement.cloneNode(true);
        docClone.querySelector('body').classList.remove('admin-mode');
        
        const adminPanel = docClone.querySelector('#admin-panel');
        if(adminPanel) adminPanel.remove();
        
        const cleanData = JSON.stringify(rawData).replace(/</g, '\\u003c');
        const dataNode = docClone.querySelector('#data-layer');
        if (dataNode) {
            dataNode.textContent = `window.INJECTED_DATA = ${cleanData};`;
        }

        const blob = new Blob(["<!DOCTYPE html>\n" + docClone.outerHTML], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `US_CTI_Report_${new Date().toISOString().split('T')[0]}.html`;
        link.click();
    }

    function generateExecBrief() {
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        
        const briefData = rawData.filter(d => {
            const isRecent = new Date(d.date) >= thirtyDaysAgo;
            const isHighSev = d.severity === 'High';
            const impending = calculateDays(d.effective_date) !== null && calculateDays(d.effective_date) <= 90 && calculateDays(d.effective_date) >= 0;
            return isHighSev || impending;
        }).sort((a, b) => new Date(b.date) - new Date(a.date));

        let html = `
        <html><head><title>CTI Executive Briefing</title>
        <style>
            body { font-family: Arial, sans-serif; padding: 40px; color: #0f172a; max-width: 1000px; margin: 0 auto; }
            h1 { border-bottom: 2px solid #dc2626; padding-bottom: 10px; color: #dc2626; }
            .item { border: 1px solid #cbd5e1; padding: 20px; margin-bottom: 20px; border-radius: 4px; page-break-inside: avoid; }
            .meta { font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 10px; text-transform: uppercase; }
            .title { margin: 0 0 10px 0; font-size: 18px; }
            .summary { margin: 0; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
            @media print { body { padding: 0; } }
        </style></head><body>
        <h1>US CTI Executive Brief: High Priority Items</h1>
        <p style="margin-bottom: 30px;">Generated: ${new Date().toLocaleDateString()} | Active High Severity & Impending Deadlines (< 90 Days)</p>`;

        if(briefData.length === 0) {
            html += `<p>No critical events detected within operational threshold.</p>`;
        } else {
            briefData.forEach(d => {
                const days = calculateDays(d.effective_date);
                const dlString = (days !== null && days >= 0) ? ` | DEADLINE: T-${days} DAYS` : '';
                const safeTitle = sanitizeHTML(d.title);
                const safeSummary = sanitizeHTML(d.summary);
                
                html += `
                <div class="item">
                    <div class="meta">${d.agency || 'UNKNOWN'} | ${d.type || 'UNKNOWN'} | SEVERITY: ${d.severity || 'N/A'} ${dlString}</div>
                    <h2 class="title">${safeTitle}</h2>
                    <p class="summary">${safeSummary}</p>
                </div>`;
            });
        }
        
        html += `</body></html>`;
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(html);
        printWindow.document.close();
        printWindow.focus();
        setTimeout(() => printWindow.print(), 500);
    }

    window.addEventListener("beforeunload", function (e) {
        const title = document.getElementById('in-title')?.value;
        const summary = document.getElementById('in-summary')?.value;
        if (title || summary) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        const tokenInput = document.getElementById('gh-token');
        const savedToken = localStorage.getItem('cti_gh_token');
        if (savedToken) tokenInput.value = savedToken;
        tokenInput.addEventListener('change', (e) => localStorage.setItem('cti_gh_token', e.target.value));
        init();
    });
</script>
