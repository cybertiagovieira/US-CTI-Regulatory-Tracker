<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US CTI Regulatory Intelligence - Builder</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root {
        --bg-main: #f1f5f9; 
        --bg-panel: #ffffff; 
        --text-main: #0f172a; 
        --text-muted: #64748b; 
        --border: #cbd5e1;
        --c-primary: rgb(0, 145, 90);
        --c-primary-hover: rgb(0, 115, 70);
        --hl-1: rgb(239, 123, 91);
        --hl-2: rgb(255, 160, 91);
        --hl-3: rgb(255, 222, 51);
        --c-gray-dark: #475569;
        --c-gray-light: #94a3b8;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Admin Panel */
    #admin-panel { background: #f0fdf4; border: 1px solid var(--c-primary); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .admin-mode #admin-panel { display: block; }
    #admin-panel h2 { margin-top: 0; color: var(--c-primary); font-size: 16px; margin-bottom: 10px;}
    .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 10px; }
    input, select, textarea { width: 100%; padding: 8px; background: #ffffff; border: 1px solid var(--border); color: var(--text-main); border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--c-primary); border-color: transparent; }
    .btn-action { background: var(--c-primary); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-action:hover { background: var(--c-primary-hover); }
    
    /* Header & Controls */
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { margin: 0; font-size: 24px; color: var(--text-main); }
    .export-group { display: flex; gap: 10px; }
    .btn-export { background: var(--c-gray-dark); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold;}
    .btn-export:hover { background: #334155; }

    /* KPI Cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .kpi-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); text-align: center; }
    .kpi-value { font-size: 28px; font-weight: bold; color: var(--c-primary); margin: 5px 0; }
    .kpi-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Filter Bar */
    .filter-bar { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

    /* Dashboard Layout */
    .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
    .sidebar { display: flex; flex-direction: column; gap: 20px; }
    .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .panel h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
    .btn-export-png { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 10px; }
    .btn-export-png:hover { background: var(--bg-main); color: var(--text-main); }
    .chart-container { position: relative; height: 220px; width: 100%; }
    
    /* Timeline */
    .timeline { border-left: 2px solid var(--border); padding-left: 20px; margin-left: 10px;}
    .event { background: var(--bg-panel); padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid transparent; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .event::before { content: ''; position: absolute; left: -26px; top: 18px; width: 10px; height: 10px; border-radius: 50%; background: var(--bg-panel); border: 2px solid var(--border); }
    .btn-delete { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: var(--hl-1); cursor: pointer; font-size: 18px; display: none; }
    .admin-mode .btn-delete { display: block; }
    
    /* Mapped Custom Colors */
    .type-final-rule { border-left-color: var(--hl-1); }
    .type-enforcement { border-left-color: var(--hl-2); }
    .type-nprm { border-left-color: var(--hl-3); }
    .type-guidance { border-left-color: var(--c-primary); }
    .type-exam { border-left-color: var(--c-gray-dark); }
    .type-speech { border-left-color: var(--c-gray-light); }
    
    .meta { display: flex; gap: 8px; margin-bottom: 8px; font-size: 11px; font-weight: bold; align-items: center; flex-wrap: wrap;}
    .badge { padding: 3px 6px; border-radius: 4px; color: #ffffff; text-shadow: 0 1px 1px rgba(0,0,0,0.2); }
    .badge.agency { background: var(--c-gray-dark); }
    .date { color: var(--text-muted); margin-left: auto; font-weight: normal; }
    .title { margin: 0 0 8px 0; font-size: 15px; color: var(--text-main); }
    .summary { margin: 0; color: #334155; font-size: 13px; line-height: 1.5; }
    
    a.source-link { color: var(--c-primary); text-decoration: none; font-size: 12px; margin-top: 8px; display: inline-block; font-weight: bold;}
    a.source-link:hover { text-decoration: underline; }
</style>
</head>
<body class="admin-mode">

<div class="container">
    <div class="header-bar">
        <h1>US CTI Regulatory Tracker: 2026</h1>
        <div class="export-group">
            <button class="btn-export" onclick="exportData('csv')">Export CSV</button>
            <button class="btn-export" onclick="exportData('json')">Export JSON</button>
            <button class="btn-export" onclick="exportArtifact()">Export HTML</button>
        </div>
    </div>

    <div id="admin-panel">
        <h2>Administrator Data Injection</h2>
        <div class="input-grid" style="background: #e2e8f0; padding: 10px; border-radius: 4px; margin-bottom: 10px;">
            <input type="password" id="gh-token" placeholder="GitHub PAT (Contents Read/Write)" required>
            <input type="text" id="gh-repo" placeholder="Target Repo (e.g. user/repo)" value="cybertiagovieira/US-CTI-Regulatory-Tracker" required>
        </div>
        <div class="input-grid">
            <input type="date" id="in-date" required>
            <select id="in-agency" required>
                <option value="OCC">OCC</option>
                <option value="FDIC">FDIC</option>
                <option value="FRB">FRB</option>
                <option value="SEC">SEC</option>
                <option value="CFTC">CFTC</option>
                <option value="FinCEN">FinCEN</option>
                <option value="CFPB">CFPB</option>
                <option value="NYDFS">NYDFS</option>
                <option value="CISA">CISA</option>
                <option value="NFA">NFA</option>
                <option value="Other/SRO">Other/SRO</option>
            </select>
            <select id="in-type" required>
                <option value="Final Rule">Final Rule</option>
                <option value="Enforcement Action">Enforcement Action</option>
                <option value="NPRM">NPRM</option>
                <option value="Guidance/Circular">Guidance/Circular</option>
                <option value="Examination Priority">Examination Priority</option>
                <option value="Speech/Statement">Speech/Statement</option>
            </select>
        </div>
        <div class="input-grid">
            <input type="text" id="in-title" placeholder="Action Title" required style="grid-column: 1 / -1;">
            <textarea id="in-summary" placeholder="Intelligence Summary" rows="2" required style="grid-column: 1 / -1;"></textarea>
        </div>
        <button class="btn-action" onclick="addEntry()">Execute Injection</button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-label">Total Regulatory Actions</div>
            <div class="kpi-value" id="kpi-total">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Primary Active Agency</div>
            <div class="kpi-value" id="kpi-agency">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Dominant Action Type</div>
            <div class="kpi-value" id="kpi-type">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Recent 30 Days</div>
            <div class="kpi-value" id="kpi-recent">0</div>
        </div>
    </div>

    <div class="filter-bar">
        <select id="filter-agency" onchange="applyFilters()">
            <option value="All">All Agencies</option>
        </select>
        <select id="filter-type" onchange="applyFilters()">
            <option value="All">All Action Types</option>
        </select>
        <input type="text" id="filter-text" placeholder="Search titles, summaries, or IDs..." onkeyup="applyFilters()">
    </div>

    <div class="dashboard-grid">
        <div class="sidebar">
            <div class="panel">
                <h3>Action Distribution <button class="btn-export-png" onclick="exportChart('donutChart', 'Distribution')">PNG</button></h3>
                <div class="chart-container"><canvas id="donutChart"></canvas></div>
            </div>
            <div class="panel">
                <h3>Agency Engagement <button class="btn-export-png" onclick="exportChart('barChart', 'Agency')">PNG</button></h3>
                <div class="chart-container"><canvas id="barChart"></canvas></div>
            </div>
            <div class="panel">
                <h3>Velocity Trend (Monthly) <button class="btn-export-png" onclick="exportChart('lineChart', 'Velocity')">PNG</button></h3>
                <div class="chart-container"><canvas id="lineChart"></canvas></div>
            </div>
        </div>
        <div class="main-content">
            <div class="timeline" id="timelineContainer"></div>
        </div>
    </div>
</div>

<script>
    const typeConfig = {
        "Final Rule": { class: "type-final-rule", color: "rgb(239, 123, 91)" },
        "Enforcement Action": { class: "type-enforcement", color: "rgb(255, 160, 91)" },
        "NPRM": { class: "type-nprm", color: "rgb(255, 222, 51)" },
        "Guidance/Circular": { class: "type-guidance", color: "rgb(0, 145, 90)" },
        "Examination Priority": { class: "type-exam", color: "#475569" },
        "Speech/Statement": { class: "type-speech", color: "#94a3b8" }
    };

    let rawData = [];
    let charts = {};
    let currentFileSha = '';

    function b64EncodeUnicode(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));
    }

    async function fetchSha() {
        const repo = document.getElementById('gh-repo').value;
        if(!repo) return;
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/master_data.json`);
            if(res.ok) {
                const data = await res.json();
                currentFileSha = data.sha;
            }
        } catch(e) {
            console.error("SHA fetch failed", e);
        }
    }

    async function init() {
        if (window.location.protocol === 'file:') {
            document.body.innerHTML = '<div style="padding: 40px; text-align: center;"><h2>Local Execution Blocked</h2><p>Execute HTTP Server.</p><code>python -m http.server 8000</code></div>';
            return;
        }

        try {
            const response = await fetch(`master_data.json?t=${new Date().getTime()}`);
            if(response.ok) {
                rawData = await response.json();
            }
        } catch (error) {
            console.error("Payload inaccessible:", error);
        }

        await fetchSha();
        populateFilterOptions();
        
        Chart.defaults.color = '#64748b';
        Chart.defaults.borderColor = '#e2e8f0';
        Chart.defaults.font.size = 11;
        
        applyFilters();
    }

    function populateFilterOptions() {
        const agencySelect = document.getElementById('filter-agency');
        const typeSelect = document.getElementById('filter-type');
        
        // HARD PATCH: Reset DOM string to prevent cumulative duplication on redraw
        agencySelect.innerHTML = '<option value="All">All Agencies</option>';
        typeSelect.innerHTML = '<option value="All">All Action Types</option>';
        
        const agencies = [...new Set(rawData.map(d => d.agency).filter(Boolean))].sort();
        const types = [...new Set(rawData.map(d => d.type).filter(Boolean))].sort();

        agencies.forEach(a => agencySelect.innerHTML += `<option value="${a}">${a}</option>`);
        types.forEach(t => typeSelect.innerHTML += `<option value="${t}">${t}</option>`);
    }

    function applyFilters() {
        const fAgency = document.getElementById('filter-agency').value;
        const fType = document.getElementById('filter-type').value;
        const fText = document.getElementById('filter-text').value.toLowerCase();

        let filtered = rawData.filter(item => {
            let matchAgency = fAgency === "All" || item.agency === fAgency;
            let matchType = fType === "All" || item.type === fType;
            let matchText = fText === "" || 
                (item.title && item.title.toLowerCase().includes(fText)) || 
                (item.summary && item.summary.toLowerCase().includes(fText)) ||
                (item.id && item.id.toLowerCase().includes(fText));
            return matchAgency && matchType && matchText;
        });

        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        updateKPIs(filtered);
        renderTimeline(filtered);
        renderCharts(filtered);
    }

    function updateKPIs(data) {
        document.getElementById('kpi-total').textContent = data.length;

        if (data.length === 0) {
            document.getElementById('kpi-agency').textContent = "-";
            document.getElementById('kpi-type').textContent = "-";
            document.getElementById('kpi-recent').textContent = "0";
            return;
        }

        const agencyCounts = {};
        const typeCounts = {};
        let recentCount = 0;
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

        data.forEach(d => {
            agencyCounts[d.agency] = (agencyCounts[d.agency] || 0) + 1;
            typeCounts[d.type] = (typeCounts[d.type] || 0) + 1;
            if (new Date(d.date) >= thirtyDaysAgo) recentCount++;
        });

        const topAgency = Object.keys(agencyCounts).reduce((a, b) => agencyCounts[a] > agencyCounts[b] ? a : b);
        const topType = Object.keys(typeCounts).reduce((a, b) => typeCounts[a] > typeCounts[b] ? a : b);

        document.getElementById('kpi-agency').textContent = topAgency;
        document.getElementById('kpi-type').textContent = topType;
        document.getElementById('kpi-recent').textContent = recentCount;
    }

    function renderTimeline(data) {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = ''; 
        const fragment = document.createDocumentFragment();

        data.forEach(item => {
            const cfg = typeConfig[item.type] || { class: "", color: "#475569" };
            const badgeTextColor = item.type === "NPRM" ? "#000000" : "#ffffff";

            const eventDiv = document.createElement('div');
            eventDiv.className = `event ${cfg.class}`;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.textContent = '×';
            deleteBtn.onclick = () => deleteEntry(item.id);
            eventDiv.appendChild(deleteBtn);

            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta';

            const typeBadge = document.createElement('span');
            typeBadge.className = 'badge';
            typeBadge.style.background = cfg.color;
            typeBadge.style.color = badgeTextColor;
            typeBadge.textContent = item.type;
            metaDiv.appendChild(typeBadge);

            const agencyBadge = document.createElement('span');
            agencyBadge.className = 'badge agency';
            agencyBadge.textContent = item.agency;
            metaDiv.appendChild(agencyBadge);

            const dateSpan = document.createElement('span');
            dateSpan.className = 'date';
            dateSpan.textContent = item.date;
            metaDiv.appendChild(dateSpan);

            eventDiv.appendChild(metaDiv);

            const titleH2 = document.createElement('h2');
            titleH2.className = 'title';
            titleH2.textContent = item.title;
            eventDiv.appendChild(titleH2);

            const summaryP = document.createElement('p');
            summaryP.className = 'summary';
            summaryP.textContent = item.summary;
            eventDiv.appendChild(summaryP);

            if(item.source_url) {
                const link = document.createElement('a');
                link.className = 'source-link';
                link.href = item.source_url;
                link.target = '_blank';
                link.textContent = 'Access Source Document →';
                eventDiv.appendChild(link);
            }

            fragment.appendChild(eventDiv);
        });
        container.appendChild(fragment);
    }

    function renderCharts(data) {
        // Doughnut: Action Types
        const types = Object.keys(typeConfig);
        const typeCounts = types.map(t => data.filter(d => d.type === t).length);
        const typeColors = types.map(t => typeConfig[t].color);

        if(charts.donut) charts.donut.destroy();
        charts.donut = new Chart(document.getElementById('donutChart'), {
            type: 'doughnut',
            data: { labels: types, datasets: [{ data: typeCounts, backgroundColor: typeColors, borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10 } } }, cutout: '70%' }
        });

        // Bar: Agencies
        const agencies = [...new Set(data.map(d => d.agency).filter(Boolean))].sort();
        const agencyCounts = agencies.map(a => data.filter(d => d.agency === a).length);
        
        if(charts.bar) charts.bar.destroy();
        charts.bar = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: agencies, datasets: [{ data: agencyCounts, backgroundColor: 'rgb(0, 145, 90)', borderRadius: 3 }] },
            options: { 
                indexAxis: 'y',
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } }, 
                scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } 
            }
        });

        // Line: Time Series
        const monthMap = {};
        data.forEach(d => {
            if(!d.date) return;
            const month = d.date.substring(0, 7);
            monthMap[month] = (monthMap[month] || 0) + 1;
        });
        const sortedMonths = Object.keys(monthMap).sort();
        const monthData = sortedMonths.map(m => monthMap[m]);

        if(charts.line) charts.line.destroy();
        charts.line = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: { labels: sortedMonths, datasets: [{ data: monthData, borderColor: 'rgb(239, 123, 91)', backgroundColor: 'rgba(239, 123, 91, 0.1)', fill: true, tension: 0.3, pointRadius: 3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    async function syncToGitHub() {
        const token = document.getElementById('gh-token').value;
        const repo = document.getElementById('gh-repo').value;
        if(!token) return alert("GitHub PAT Required.") && false;

        const url = `https://api.github.com/repos/${repo}/contents/master_data.json`;
        const content = b64EncodeUnicode(JSON.stringify(rawData, null, 2));
        const body = { message: "Dashboard Admin: Update Payload", content: content, branch: "main" };
        if (currentFileSha) body.sha = currentFileSha;

        try {
            const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if(res.ok) {
                const data = await res.json();
                currentFileSha = data.content.sha;
                return true;
            } else {
                alert("API Rejection.");
                return false;
            }
        } catch(e) {
            alert("Network routing error.");
            return false;
        }
    }

    async function addEntry() {
        const date = document.getElementById('in-date').value;
        const agency = document.getElementById('in-agency').value;
        const type = document.getElementById('in-type').value;
        const title = document.getElementById('in-title').value;
        const summary = document.getElementById('in-summary').value;

        if(!date || !title || !summary) return alert('Define Date, Title, and Summary.');

        rawData.push({ id: Date.now().toString(), date, agency, type, title, summary });
        const success = await syncToGitHub();
        if(success) {
            document.getElementById('in-title').value = '';
            document.getElementById('in-summary').value = '';
            populateFilterOptions();
            applyFilters();
        } else {
            rawData.pop();
        }
    }

    async function deleteEntry(id) {
        if(!confirm("Execute deletion protocol?")) return;
        const backup = [...rawData];
        rawData = rawData.filter(d => d.id !== id);
        
        const success = await syncToGitHub();
        if(success) {
            populateFilterOptions();
            applyFilters();
        } else {
            rawData = backup;
        }
    }

    // Export Routines
    function exportChart(canvasId, name) {
        const link = document.createElement('a');
        link.download = `CTI_Chart_${name}.png`;
        link.href = document.getElementById(canvasId).toDataURL('image/png', 1.0);
        link.click();
    }

    function exportData(format) {
        let content, mime, ext;
        const exportSet = rawData; 

        if (format === 'csv') {
            const headers = ['id', 'date', 'agency', 'type', 'title', 'summary', 'source_url'];
            const rows = exportSet.map(row => 
                headers.map(h => {
                    let val = row[h] ? row[h].toString().replace(/"/g, '""') : '';
                    return `"${val}"`;
                }).join(',')
            );
            content = [headers.join(','), ...rows].join('\n');
            mime = 'text/csv;charset=utf-8;';
            ext = 'csv';
        } else if (format === 'json') {
            content = JSON.stringify(exportSet, null, 2);
            mime = 'application/json';
            ext = 'json';
        }

        const blob = new Blob([content], { type: mime });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `US_CTI_Extract_${new Date().toISOString().split('T')[0]}.${ext}`;
        link.click();
    }

    function exportArtifact() {
        document.getElementById('filter-agency').value = 'All';
        document.getElementById('filter-type').value = 'All';
        document.getElementById('filter-text').value = '';
        applyFilters();

        const docClone = document.documentElement.cloneNode(true);
        docClone.querySelector('body').classList.remove('admin-mode');
        const adminPanel = docClone.querySelector('#admin-panel');
        if(adminPanel) adminPanel.remove();
        
        const blob = new Blob(["<!DOCTYPE html>\n" + docClone.outerHTML], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `US_CTI_Report_${new Date().toISOString().split('T')[0]}.html`;
        link.click();
    }

    window.addEventListener('DOMContentLoaded', () => {
        const tokenInput = document.getElementById('gh-token');
        const savedToken = localStorage.getItem('cti_gh_token');
        if (savedToken) tokenInput.value = savedToken;
        tokenInput.addEventListener('change', (e) => localStorage.setItem('cti_gh_token', e.target.value));
        init();
    });
</script>
</body>
</html>
